  <script>

      try { t = localStorage.getItem('theme'); } catch (e) {}

      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <site-header></site-header>

    <project-nav></project-nav>

      <div class="split-head">
        <h1 class="about-lead display-md">Mirror</h1>
        <div class="about-body body-lg">
          <p>An interactive webcam filter. Draw your own grid of cells, then feed those cells with the camera feed — your sketch becomes a live filter you can see yourself through in real time. Design the filter, look at yourself through it.</p>

          <div class="project-links">
            <span class="meta-label">Project links</span>
            <div class="project-links-list">
              <a href="https://stihilus.github.io/Ogledalo/" target="_blank" rel="noopener noreferrer">Try the app ↗</a>

            </div>
          </div>
        </div>
